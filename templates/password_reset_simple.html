{% extends 'base.html' %}
{% block content %}
<div class="auth-wrapper py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="auth-card p-5">
                    <div class="text-center mb-4">
                        <i class="bi bi-shield-lock text-primary display-4"></i>
                        <h2 class="fw-800 mt-3">Reset Password</h2>
                        <p class="text-muted small">Enter your email and set a new password.</p>
                    </div>

                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-danger py-2 small">{{ message }}</div>
                        {% endfor %}
                    {% endif %}

                    <form method="POST">
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-bold small">Email Address</label>
                            <input type="email" name="email" class="form-control custom-input no-group" value="{{ email }}" placeholder="name@cimage.in" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-bold small">New Password</label>
                            <input type="password" name="password" class="form-control custom-input no-group" placeholder="••••••••" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label fw-bold small">Confirm Password</label>
                            <input type="password" name="confirm_password" class="form-control custom-input no-group" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-auth w-100 py-3">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
